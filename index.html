<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d10000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="اتروپارس">
    <meta name="mobile-web-app-capable" content="yes">
    <title>کاتالوگ هوشمند اتروپارس</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--  گوشه راست بالا: خانه + بازگشت -->
    <div class="nav-right" id="navRight">
        <button id="btnHome"  class="nav-glass-btn" title="خانه">⌂</button>
        <button id="btnBack"  class="nav-glass-btn hidden" title="بازگشت">‹</button>
    </div>

    <!-- گوشه چپ بالا: سبد + تاریخچه -->
    <div class="nav-left" id="navLeft">
        <div class="nav-glass-btn cart-wrap" id="cartFloat" title="سبد خرید">
            ⊕
            <span class="cart-badge empty" id="cartBadge">0</span>
        </div>
        <div class="nav-glass-btn history-wrap" id="historyFloat" title="تاریخچه">
            ☰
            <span class="history-badge" id="historyBadge"></span>
        </div>
    </div>

    <div id="app">
        <div id="page-container"></div>
    </div>

    <script src="products.js"></script>
    <script src="app.js"></script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const nw = reg.installing;
                        nw.addEventListener('statechange', () => {
                            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                                if (typeof showUpdateNotification === 'function') showUpdateNotification();
                            }
                        });
                    });
                }).catch(e => console.log('SW:', e));
        });
    }
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault(); deferredPrompt = e;
        setTimeout(() => { if (deferredPrompt) showInstallBanner(); }, 4000);
    });
    function showInstallBanner() {
        if (document.getElementById('installBanner')) return;
        const b = document.createElement('div');
        b.id = 'installBanner';
        b.innerHTML = `<div style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#d10000,#a30000);color:#fff;padding:12px 18px;border-radius:14px;font-family:Tahoma,sans-serif;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(209,0,0,0.4);display:flex;align-items:center;gap:10px;direction:rtl">
            <span>📲 نصب کاتالوگ روی گوشی</span>
            <button onclick="installPWA()" style="background:#fff;color:#d10000;border:none;border-radius:7px;padding:5px 12px;font-size:13px;cursor:pointer;font-weight:bold">نصب</button>
            <button onclick="this.closest('#installBanner').remove()" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:6px;padding:5px 9px;cursor:pointer">✕</button>
        </div>`;
        document.body.appendChild(b);
    }
    function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('installBanner')?.remove(); });
        }
    }
    </script>
</body>
</html>
