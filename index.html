<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d10000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="اتروپارس">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>کاتالوگ هوشمند اتروپارس</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css?v=20260630">
</head>
<body>

    <!--  گوشه راست بالا: سبد + تاریخچه -->
    <div class="nav-right" id="navRight">
        <div class="nav-glass-btn cart-wrap" id="cartFloat" title="سبد خرید">
            <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="cart-badge empty" id="cartBadge">0</span>
        </div>
        <div class="nav-glass-btn history-wrap" id="historyFloat" title="تاریخچه">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
            <span class="history-badge" id="historyBadge"></span>
        </div>
    </div>

    <!-- گوشه چپ بالا: خانه + بازگشت -->
    <div class="nav-left" id="navLeft">
        <button id="btnHome" class="nav-glass-btn" title="خانه">
            <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <button id="btnBack" class="nav-glass-btn hidden" title="بازگشت">
            <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
    </div>

    <div id="app">
        <div id="page-container"></div>
    </div>

    <script src="products.js?v=20260630"></script>
    <script src="app.js?v=20260630"></script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js?v=20260630')
                .then(reg => {
                    // هر بار صفحه باز می‌شه، فوراً چک کن آپدیت جدید هست یا نه
                    reg.update();

                    reg.addEventListener('updatefound', () => {
                        const nw = reg.installing;
                        nw.addEventListener('statechange', () => {
                            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                                // نسخه جدید نصب شد - فوراً فعالش کن و صفحه رو رفرش کن
                                nw.postMessage({ type: 'SKIP_WAITING' });
                            }
                        });
                    });
                }).catch(e => console.log('SW:', e));

            // اگه controller عوض شد (نسخه جدید فعال شد)، صفحه رو رفرش کن
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });
        });

        // هر بار اپ به فورگراند برمی‌گرده، چک آپدیت
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                navigator.serviceWorker.getRegistration().then(reg => { if (reg) reg.update(); });
            }
        });
    }
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault(); deferredPrompt = e;
        setTimeout(() => { if (deferredPrompt) showInstallBanner(); }, 4000);
    });
    function showInstallBanner() {
        if (document.getElementById('installBanner')) return;
        const b = document.createElement('div');
        b.id = 'installBanner';
        b.innerHTML = `<div style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#d10000,#a30000);color:#fff;padding:12px 18px;border-radius:14px;font-family:Tahoma,sans-serif;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(209,0,0,0.4);display:flex;align-items:center;gap:10px;direction:rtl">
            <span>📲 نصب کاتالوگ روی گوشی</span>
            <button onclick="installPWA()" style="background:#fff;color:#d10000;border:none;border-radius:7px;padding:5px 12px;font-size:13px;cursor:pointer;font-weight:bold">نصب</button>
            <button onclick="this.closest('#installBanner').remove()" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:6px;padding:5px 9px;cursor:pointer">✕</button>
        </div>`;
        document.body.appendChild(b);
    }
    function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('installBanner')?.remove(); });
        }
    }
    </script>
</body>
</html>
